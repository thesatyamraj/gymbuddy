<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GymBuddy Finder — Find your perfect training partner. Swipe, match, and train together." />
    <meta name="theme-color" content="#0a0a0a" id="meta-theme-color" />
    <script>
      // Apply saved theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var saved = localStorage.getItem('gymbuddy-theme');
          var theme = (saved === 'light' || saved === 'dark') ? saved : 'dark';
          var root = document.documentElement;
          if (theme === 'dark') root.classList.add('dark');
          root.style.colorScheme = theme;
          var m = document.getElementById('meta-theme-color');
          if (m) m.setAttribute('content', theme === 'dark' ? '#0a0a0a' : '#ffffff');
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>GymBuddy Finder — Find Your Perfect Training Partner</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
